name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: build-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            .pio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build
        run: platformio run -e esp32c3_supermini

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-esp32c3_supermini
          path: |
            .pio/build/esp32c3_supermini/bootloader.bin
            .pio/build/esp32c3_supermini/firmware.bin
            .pio/build/esp32c3_supermini/partitions.bin
            ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin
          if-no-files-found: error
